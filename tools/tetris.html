<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
        --bg: #1a1a1a;
        --panel: #2a2a2a;
        --panel-hi: #333;
        --line: #333;
        --muted: #888;
        --accent: #6bb3ff;
        --well: #0e0e0e;
    }
    html, body {
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
        background: var(--bg);
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        -webkit-user-select: none; user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
    }
    .app {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    /* ---- HUD ---- */
    .hud {
        display: flex;
        align-items: stretch;
        gap: 8px;
        padding: 8px 10px 6px;
    }
    .box {
        background: var(--panel);
        border-radius: 8px;
        padding: 5px 6px 6px;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-width: 62px;
    }
    .box .lbl { font-size: 10px; letter-spacing: 1px; color: var(--muted); margin-bottom: 3px; }
    .box canvas { display: block; }
    .stats {
        flex: 1;
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-auto-rows: 1fr;
        gap: 4px 8px;
        background: var(--panel);
        border-radius: 8px;
        padding: 6px 10px;
        align-content: center;
    }
    .stat { display: flex; flex-direction: column; justify-content: center; }
    .stat .lbl { font-size: 10px; letter-spacing: 1px; color: var(--muted); }
    .stat .val { font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1.1; }

    /* ---- Stage / board ---- */
    .stage {
        position: relative;
        flex: 1;
        min-height: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 4px 10px;
    }
    #board {
        display: block;
        background: var(--well);
        border-radius: 6px;
        box-shadow: 0 0 0 2px #000 inset, 0 6px 24px rgba(0,0,0,.5);
        touch-action: none;
    }
    .pause-btn {
        position: absolute;
        top: 10px; right: 18px;
        width: 34px; height: 34px;
        border: none; border-radius: 8px;
        background: rgba(42,42,42,.85);
        color: #fff; font-size: 14px;
        display: flex; align-items: center; justify-content: center;
        touch-action: manipulation;
    }
    .pause-btn:active { background: var(--panel-hi); }

    /* ---- Overlay ---- */
    .overlay {
        position: absolute;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(14,14,14,.82);
        backdrop-filter: blur(3px);
        -webkit-backdrop-filter: blur(3px);
        border-radius: 6px;
        z-index: 5;
    }
    .overlay.show { display: flex; }
    .panel { text-align: center; padding: 24px; max-width: 280px; }
    .panel h1 { font-size: 34px; letter-spacing: 4px; margin-bottom: 6px; }
    .panel h2 { font-size: 26px; margin-bottom: 10px; }
    .panel p { color: var(--muted); font-size: 13px; line-height: 1.6; margin-bottom: 18px; }
    .panel .big { color: #fff; font-size: 16px; }
    .panel .big b { color: var(--accent); }
    .panel button {
        display: block;
        width: 100%;
        margin: 8px 0 0;
        padding: 13px;
        font-size: 16px;
        font-weight: 600;
        border: none;
        border-radius: 10px;
        background: var(--accent);
        color: #08233f;
        touch-action: manipulation;
    }
    .panel button.sec { background: var(--panel); color: #fff; }
    .panel button:active { filter: brightness(.9); }

    /* ---- Control pad ---- */
    .pad {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        padding: 6px 10px calc(10px + env(safe-area-inset-bottom));
    }
    .pad button {
        -webkit-appearance: none; appearance: none;
        border: none;
        background: var(--panel);
        color: #fff;
        border-radius: 12px;
        padding: 16px 0;
        font-size: 22px;
        line-height: 1;
        touch-action: none;
        transition: background .04s, transform .04s;
        display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .pad button .sub { font-size: 10px; color: var(--muted); letter-spacing: 1px; }
    .pad button.on, .pad button:active { background: var(--accent); color: #08233f; transform: scale(.97); }
    .pad button.on .sub, .pad button:active .sub { color: #08233f; }
    .pad button.wide-drop { font-size: 20px; }

    @media (max-height: 620px) {
        .hud { padding: 4px 8px 4px; }
        .stat .val { font-size: 15px; }
        .pad button { padding: 12px 0; font-size: 20px; }
    }
</style>
</head>
<body>
<div class="app">
    <div class="hud">
        <div class="box">
            <div class="lbl">HOLD</div>
            <canvas id="hold" width="52" height="40"></canvas>
        </div>
        <div class="stats">
            <div class="stat"><span class="lbl">SCORE</span><span class="val" id="score">0</span></div>
            <div class="stat"><span class="lbl">LEVEL</span><span class="val" id="level">1</span></div>
            <div class="stat"><span class="lbl">LINES</span><span class="val" id="lines">0</span></div>
            <div class="stat"><span class="lbl">BEST</span><span class="val" id="best">0</span></div>
        </div>
        <div class="box">
            <div class="lbl">NEXT</div>
            <canvas id="next" width="52" height="40"></canvas>
        </div>
    </div>

    <div class="stage">
        <canvas id="board"></canvas>
        <button class="pause-btn" id="pauseBtn" aria-label="Pause">&#10073;&#10073;</button>
        <div class="overlay" id="overlay"></div>
    </div>

    <div class="pad">
        <button data-act="left" aria-label="Move left">&#9664;</button>
        <button data-act="rotate" aria-label="Rotate">&#10227;</button>
        <button data-act="right" aria-label="Move right">&#9654;</button>
        <button data-act="soft" aria-label="Soft drop">&#9660;<span class="sub">SOFT</span></button>
        <button data-act="hold" aria-label="Hold">&#8645;<span class="sub">HOLD</span></button>
        <button data-act="hard" class="wide-drop" aria-label="Hard drop">&#10515;<span class="sub">DROP</span></button>
    </div>
</div>

<script>
"use strict";
(function () {
    // ---------- constants ----------
    const COLS = 10, ROWS = 20;
    const LOCK_DELAY = 500;      // ms a grounded piece waits before locking
    const LOCK_MAX_RESETS = 15;  // anti-stall cap
    const DAS = 160, ARR = 45;   // button auto-repeat (delay / rate) ms

    const COLORS = {
        I: '#31c7ef', O: '#f7d308', T: '#ad4d9c',
        S: '#42b642', Z: '#e53935', J: '#3f51b5', L: '#ef7921'
    };
    // spawn-orientation cells as [row, col] inside an n x n box
    const SHAPES = {
        I: { n: 4, cells: [[1,0],[1,1],[1,2],[1,3]] },
        O: { n: 2, cells: [[0,0],[0,1],[1,0],[1,1]] },
        T: { n: 3, cells: [[0,1],[1,0],[1,1],[1,2]] },
        S: { n: 3, cells: [[0,1],[0,2],[1,0],[1,1]] },
        Z: { n: 3, cells: [[0,0],[0,1],[1,1],[1,2]] },
        J: { n: 3, cells: [[0,0],[1,0],[1,1],[1,2]] },
        L: { n: 3, cells: [[0,2],[1,0],[1,1],[1,2]] }
    };
    // SRS wall-kick offsets [dCol, dRow]  (row positive = down)
    const KICKS = {
        JLSTZ: {
            '0>1': [[0,0],[-1,0],[-1,-1],[0,2],[-1,2]],
            '1>0': [[0,0],[1,0],[1,1],[0,-2],[1,-2]],
            '1>2': [[0,0],[1,0],[1,1],[0,-2],[1,-2]],
            '2>1': [[0,0],[-1,0],[-1,-1],[0,2],[-1,2]],
            '2>3': [[0,0],[1,0],[1,-1],[0,2],[1,2]],
            '3>2': [[0,0],[-1,0],[-1,1],[0,-2],[-1,-2]],
            '3>0': [[0,0],[-1,0],[-1,1],[0,-2],[-1,-2]],
            '0>3': [[0,0],[1,0],[1,-1],[0,2],[1,2]]
        },
        I: {
            '0>1': [[0,0],[-2,0],[1,0],[-2,1],[1,-2]],
            '1>0': [[0,0],[2,0],[-1,0],[2,-1],[-1,2]],
            '1>2': [[0,0],[-1,0],[2,0],[-1,-2],[2,1]],
            '2>1': [[0,0],[1,0],[-2,0],[1,2],[-2,-1]],
            '2>3': [[0,0],[2,0],[-1,0],[2,-1],[-1,2]],
            '3>2': [[0,0],[-2,0],[1,0],[-2,1],[1,-2]],
            '3>0': [[0,0],[1,0],[-2,0],[1,2],[-2,-1]],
            '0>3': [[0,0],[-1,0],[2,0],[-1,-2],[2,1]]
        }
    };
    const LINE_SCORES = [0, 100, 300, 500, 800];

    // Pre-compute the four rotation states (cell lists) for every piece.
    const ROT = {};
    for (const t in SHAPES) {
        const n = SHAPES[t].n;
        let cur = SHAPES[t].cells.map(c => c.slice());
        ROT[t] = [cur];
        for (let r = 1; r < 4; r++) {
            cur = cur.map(([row, col]) => [col, n - 1 - row]); // clockwise
            ROT[t].push(cur);
        }
    }

    function gravityFor(level) {
        const base = Math.max(0.06, 0.8 - (level - 1) * 0.007);
        return Math.pow(base, level - 1) * 1000; // ms per cell
    }

    // ---------- DOM ----------
    const boardCv = document.getElementById('board');
    const bctx = boardCv.getContext('2d');
    const nextCv = document.getElementById('next');
    const holdCv = document.getElementById('hold');
    const overlay = document.getElementById('overlay');
    const elScore = document.getElementById('score');
    const elLevel = document.getElementById('level');
    const elLines = document.getElementById('lines');
    const elBest = document.getElementById('best');

    // ---------- state ----------
    let grid, piece, queue, holdType, holdUsed;
    let score, lines, level, best;
    let running = false, paused = false, gameover = false, started = false;
    let gravityTimer = 0, lockTimer = 0, lockResets = 0;
    let lastTime = 0;
    let cell = 24;            // px per cell (computed on resize)
    let clearAnim = null;     // {rows:[], t:ms} brief flash on line clear

    best = parseInt(localStorage.getItem('tetris.best') || '0', 10) || 0;
    elBest.textContent = best;

    // ---------- piece helpers ----------
    function newGrid() {
        return Array.from({ length: ROWS }, () => new Array(COLS).fill(null));
    }
    function refillQueue() {
        while (queue.length <= 5) {
            const bag = ['I','O','T','S','Z','J','L'];
            for (let i = bag.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [bag[i], bag[j]] = [bag[j], bag[i]];
            }
            queue.push(...bag);
        }
    }
    function makePiece(type) {
        const col = type === 'O' ? 4 : 3;
        const row = type === 'I' ? -1 : 0;
        return { type, rot: 0, r: row, c: col };
    }
    function cellsOf(p) {
        return ROT[p.type][p.rot].map(([row, col]) => [p.r + row, p.c + col]);
    }
    function collides(p) {
        for (const [r, c] of cellsOf(p)) {
            if (c < 0 || c >= COLS || r >= ROWS) return true;
            if (r >= 0 && grid[r][c]) return true;
        }
        return false;
    }
    function spawn(type) {
        piece = makePiece(type != null ? type : queue.shift());
        refillQueue();
        gravityTimer = 0; lockTimer = 0; lockResets = 0;
        drawMini(nextCv, queue[0]);
        if (collides(piece)) endGame();
    }

    // ---------- actions ----------
    function resetLock() {
        if (collides(below(piece))) {           // grounded -> count the reset
            lockTimer = 0;
            lockResets++;
        }
    }
    function below(p) { return { type: p.type, rot: p.rot, r: p.r + 1, c: p.c }; }

    function move(dc) {
        if (!running || paused || gameover) return false;
        const t = { type: piece.type, rot: piece.rot, r: piece.r, c: piece.c + dc };
        if (!collides(t)) { piece = t; resetLock(); return true; }
        return false;
    }
    function rotate(dir) { // dir: 1 = CW, -1 = CCW
        if (!running || paused || gameover) return false;
        if (piece.type === 'O') return false;
        const from = piece.rot;
        const to = (from + (dir > 0 ? 1 : 3)) % 4;
        const table = (piece.type === 'I' ? KICKS.I : KICKS.JLSTZ)[from + '>' + to];
        for (const [dx, dy] of table) {
            const t = { type: piece.type, rot: to, r: piece.r + dy, c: piece.c + dx };
            if (!collides(t)) { piece = t; resetLock(); return true; }
        }
        return false;
    }
    function softStep() {
        if (!running || paused || gameover) return;
        const t = below(piece);
        if (!collides(t)) { piece = t; score += 1; gravityTimer = 0; updateHUD(); }
    }
    function hardDrop() {
        if (!running || paused || gameover) return;
        let d = 0;
        while (!collides(below(piece))) { piece.r++; d++; }
        score += d * 2;
        lockPiece();
    }
    function hold() {
        if (!running || paused || gameover || holdUsed) return;
        const cur = piece.type;
        if (holdType == null) { holdType = cur; spawn(); }
        else { const swap = holdType; holdType = cur; spawn(swap); }
        holdUsed = true;
        drawMini(holdCv, holdType);
    }

    function lockPiece() {
        let topOut = false;
        for (const [r, c] of cellsOf(piece)) {
            if (r < 0) { topOut = true; continue; }
            grid[r][c] = COLORS[piece.type];
        }
        clearLines();
        holdUsed = false;
        if (topOut) { endGame(); return; }
        spawn();
    }

    function clearLines() {
        const full = [];
        for (let r = 0; r < ROWS; r++) {
            if (grid[r].every(Boolean)) full.push(r);
        }
        if (!full.length) return;
        clearAnim = { rows: full.slice(), t: 0 };
        const fullSet = new Set(full);
        const kept = grid.filter((_, r) => !fullSet.has(r));
        while (kept.length < ROWS) kept.unshift(new Array(COLS).fill(null));
        grid = kept;
        const n = full.length;
        score += LINE_SCORES[n] * level;
        lines += n;
        level = Math.min(20, Math.floor(lines / 10) + 1);
        updateHUD();
    }

    // ---------- lifecycle ----------
    function startGame() {
        grid = newGrid();
        queue = []; refillQueue();
        holdType = null; holdUsed = false;
        score = 0; lines = 0; level = 1;
        clearAnim = null;
        gameover = false; paused = false; running = true; started = true;
        spawn();
        drawMini(holdCv, null);
        updateHUD();
        hideOverlay();
        lastTime = performance.now();
    }
    function endGame() {
        running = false; gameover = true;
        if (score > best) { best = score; localStorage.setItem('tetris.best', String(best)); }
        updateHUD();
        showOverlay('over');
    }
    function pause() {
        if (!running || gameover) return;
        paused = true; running = false;
        showOverlay('paused');
    }
    function resume() {
        if (!started || gameover) return;
        paused = false; running = true;
        hideOverlay();
        lastTime = performance.now();
    }

    // ---------- loop ----------
    function frame(now) {
        const dt = Math.min(100, now - lastTime);
        lastTime = now;
        if (clearAnim) { clearAnim.t += dt; if (clearAnim.t > 120) clearAnim = null; }
        if (running && !paused && !gameover) update(dt);
        render();
        requestAnimationFrame(frame);
    }
    function update(dt) {
        if (!collides(below(piece))) {
            const interval = gravityFor(level);
            gravityTimer += dt;
            while (gravityTimer >= interval && !collides(below(piece))) {
                gravityTimer -= interval;
                piece.r++;
                lockTimer = 0; lockResets = 0;
            }
        }
        if (collides(below(piece))) {
            lockTimer += dt;
            if (lockTimer >= LOCK_DELAY || lockResets >= LOCK_MAX_RESETS) lockPiece();
        } else {
            lockTimer = 0;
        }
    }

    // ---------- rendering ----------
    function resize() {
        const stage = document.querySelector('.stage');
        const availW = stage.clientWidth - 2;
        const availH = stage.clientHeight - 2;
        cell = Math.max(8, Math.floor(Math.min(availW / COLS, availH / ROWS)));
        const w = cell * COLS, h = cell * ROWS;
        const dpr = Math.min(3, window.devicePixelRatio || 1);
        boardCv.style.width = w + 'px';
        boardCv.style.height = h + 'px';
        boardCv.width = Math.round(w * dpr);
        boardCv.height = Math.round(h * dpr);
        bctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        for (const cv of [nextCv, holdCv]) {
            const cw = 52, ch = 40;
            cv.style.width = cw + 'px'; cv.style.height = ch + 'px';
            cv.width = Math.round(cw * dpr); cv.height = Math.round(ch * dpr);
            cv.getContext('2d').setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        if (started) { drawMini(nextCv, queue && queue[0]); drawMini(holdCv, holdType); }
        render();
    }

    function shade(hex, f) { // f>0 lighten, f<0 darken
        const n = parseInt(hex.slice(1), 16);
        let r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
        if (f >= 0) { r += (255 - r) * f; g += (255 - g) * f; b += (255 - b) * f; }
        else { r *= (1 + f); g *= (1 + f); b *= (1 + f); }
        return 'rgb(' + (r|0) + ',' + (g|0) + ',' + (b|0) + ')';
    }
    function drawCell(ctx, x, y, s, color, alpha) {
        ctx.globalAlpha = alpha == null ? 1 : alpha;
        const b = Math.max(2, s * 0.16);
        ctx.fillStyle = color;
        ctx.fillRect(x, y, s, s);
        ctx.fillStyle = shade(color, 0.45);
        ctx.fillRect(x, y, s, b); ctx.fillRect(x, y, b, s);
        ctx.fillStyle = shade(color, -0.4);
        ctx.fillRect(x, y + s - b, s, b); ctx.fillRect(x + s - b, y, b, s);
        ctx.globalAlpha = 1;
    }
    function render() {
        const w = cell * COLS, h = cell * ROWS;
        bctx.fillStyle = '#0e0e0e';
        bctx.fillRect(0, 0, w, h);
        // grid lines
        bctx.strokeStyle = 'rgba(255,255,255,0.05)';
        bctx.lineWidth = 1;
        bctx.beginPath();
        for (let c = 1; c < COLS; c++) { bctx.moveTo(c * cell + 0.5, 0); bctx.lineTo(c * cell + 0.5, h); }
        for (let r = 1; r < ROWS; r++) { bctx.moveTo(0, r * cell + 0.5); bctx.lineTo(w, r * cell + 0.5); }
        bctx.stroke();

        // locked cells
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (grid && grid[r][c]) drawCell(bctx, c * cell, r * cell, cell, grid[r][c]);
            }
        }
        // line-clear flash
        if (clearAnim) {
            bctx.fillStyle = 'rgba(255,255,255,' + (0.8 - clearAnim.t / 150) + ')';
            for (const r of clearAnim.rows) bctx.fillRect(0, r * cell, w, cell);
        }

        if (piece && (running || paused)) {
            // ghost
            const ghost = { type: piece.type, rot: piece.rot, r: piece.r, c: piece.c };
            while (!collides(below(ghost))) ghost.r++;
            const color = COLORS[piece.type];
            for (const [r, c] of cellsOf(ghost)) {
                if (r >= 0) drawCell(bctx, c * cell, r * cell, cell, color, 0.18);
            }
            // active piece
            for (const [r, c] of cellsOf(piece)) {
                if (r >= 0) drawCell(bctx, c * cell, r * cell, cell, color);
            }
        }
    }
    function drawMini(cv, type) {
        const ctx = cv.getContext('2d');
        const cw = 52, ch = 40;
        ctx.clearRect(0, 0, cw, ch);
        if (!type) return;
        const cells = ROT[type][0];
        let minr = 9, maxr = -9, minc = 9, maxc = -9;
        for (const [r, c] of cells) {
            minr = Math.min(minr, r); maxr = Math.max(maxr, r);
            minc = Math.min(minc, c); maxc = Math.max(maxc, c);
        }
        const pw = maxc - minc + 1, ph = maxr - minr + 1;
        const s = Math.floor(Math.min((cw - 8) / pw, (ch - 8) / ph));
        const ox = (cw - pw * s) / 2 - minc * s;
        const oy = (ch - ph * s) / 2 - minr * s;
        for (const [r, c] of cells) drawCell(ctx, ox + c * s, oy + r * s, s, COLORS[type]);
    }
    function updateHUD() {
        elScore.textContent = score;
        elLevel.textContent = level;
        elLines.textContent = lines;
        elBest.textContent = Math.max(best, score);
    }

    // ---------- overlay ----------
    function showOverlay(state) {
        let html = '';
        if (state === 'start') {
            html = '<div class="panel"><h1>TETRIS</h1>' +
                '<p>Drag to move &middot; tap to rotate &middot; swipe down to drop<br>or use the buttons below</p>' +
                '<button data-ov="play">Play</button></div>';
        } else if (state === 'paused') {
            html = '<div class="panel"><h2>Paused</h2>' +
                '<button data-ov="resume">Resume</button>' +
                '<button class="sec" data-ov="play">Restart</button></div>';
        } else if (state === 'over') {
            html = '<div class="panel"><h2>Game Over</h2>' +
                '<p class="big">Score <b>' + score + '</b><br>Best <b>' + Math.max(best, score) + '</b></p>' +
                '<button data-ov="play">Play Again</button></div>';
        }
        overlay.innerHTML = html;
        overlay.classList.add('show');
    }
    function hideOverlay() { overlay.classList.remove('show'); overlay.innerHTML = ''; }
    overlay.addEventListener('click', e => {
        const t = e.target.closest('[data-ov]');
        if (!t) return;
        if (t.dataset.ov === 'play') startGame();
        else if (t.dataset.ov === 'resume') resume();
    });

    // ---------- input: buttons ----------
    const repeatable = { left: () => move(-1), right: () => move(1), soft: softStep };
    const single = { rotate: () => rotate(1), hard: hardDrop, hold: hold };
    document.querySelectorAll('.pad button').forEach(btn => {
        const act = btn.dataset.act;
        if (repeatable[act]) {
            let to = null, iv = null;
            const fn = repeatable[act];
            const start = e => {
                e.preventDefault();
                if (!running || paused || gameover) return;
                fn();
                btn.classList.add('on');
                to = setTimeout(() => { iv = setInterval(fn, ARR); }, DAS);
            };
            const stop = () => { clearTimeout(to); clearInterval(iv); to = iv = null; btn.classList.remove('on'); };
            btn.addEventListener('pointerdown', start);
            btn.addEventListener('pointerup', stop);
            btn.addEventListener('pointercancel', stop);
            btn.addEventListener('pointerleave', stop);
        } else {
            btn.addEventListener('pointerdown', e => { e.preventDefault(); single[act](); });
        }
    });

    // ---------- input: keyboard (desktop) ----------
    document.addEventListener('keydown', e => {
        if (e.repeat && (e.key === ' ' || e.key.toLowerCase() === 'c')) return;
        switch (e.key) {
            case 'ArrowLeft': move(-1); break;
            case 'ArrowRight': move(1); break;
            case 'ArrowDown': softStep(); break;
            case 'ArrowUp': case 'x': case 'X': rotate(1); break;
            case 'z': case 'Z': case 'Control': rotate(-1); break;
            case ' ': e.preventDefault(); hardDrop(); break;
            case 'c': case 'C': case 'Shift': hold(); break;
            case 'p': case 'P': paused ? resume() : pause(); break;
            case 'Enter': if (!running && !paused) startGame(); break;
            default: return;
        }
        e.preventDefault();
    });

    // ---------- input: board gestures ----------
    (function () {
        let active = false, sx = 0, sy = 0, st = 0, ax = 0, ay = 0, moved = false, didDown = false;
        const stepPx = () => Math.max(20, cell);
        boardCv.addEventListener('touchstart', e => {
            if (!running || paused || gameover) return;
            const t = e.touches[0];
            active = true; sx = ax = t.clientX; sy = ay = t.clientY;
            st = performance.now(); moved = false; didDown = false;
            e.preventDefault();
        }, { passive: false });
        boardCv.addEventListener('touchmove', e => {
            if (!active) return;
            e.preventDefault();
            const t = e.touches[0];
            const step = stepPx();
            while (t.clientX - ax >= step) { move(1); ax += step; moved = true; }
            while (t.clientX - ax <= -step) { move(-1); ax -= step; moved = true; }
            while (t.clientY - ay >= step) { softStep(); ay += step; moved = true; didDown = true; }
        }, { passive: false });
        const finish = e => {
            if (!active) return;
            active = false;
            const t = (e.changedTouches && e.changedTouches[0]) || null;
            if (!t) return;
            const dt = performance.now() - st;
            const totX = t.clientX - sx, totY = t.clientY - sy;
            const dist = Math.hypot(totX, totY);
            if (!moved && dist < 14 && dt < 250) { rotate(1); }
            else if (totY < -45 && Math.abs(totY) > Math.abs(totX) * 1.2 && dt < 350) { hold(); }
            else if (dt < 250 && totY > 70 && Math.abs(totY) > Math.abs(totX) && (totY / dt) > 0.8) { hardDrop(); }
        };
        boardCv.addEventListener('touchend', finish);
        boardCv.addEventListener('touchcancel', () => { active = false; });
    })();

    // ---------- misc ----------
    document.getElementById('pauseBtn').addEventListener('pointerdown', e => {
        e.preventDefault();
        if (paused) resume(); else pause();
    });
    document.addEventListener('visibilitychange', () => { if (document.hidden) pause(); });
    window.addEventListener('resize', resize);
    window.addEventListener('orientationchange', () => setTimeout(resize, 250));

    // ---------- boot ----------
    resize();
    showOverlay('start');
    requestAnimationFrame(frame);
})();
</script>
</body>
</html>
